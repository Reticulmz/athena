# athena development reverse proxy
# Usage: nginx -c /path/to/nginx.dev.conf -g 'daemon off; error_log /dev/stderr;'

worker_processes 1;
pid /tmp/nginx-athena.pid;

events {
    worker_connections 64;
}

http {
    # Temp paths for non-root operation
    client_body_temp_path /tmp/nginx-athena-client-body;
    proxy_temp_path       /tmp/nginx-athena-proxy;
    fastcgi_temp_path     /tmp/nginx-athena-fastcgi;
    uwsgi_temp_path       /tmp/nginx-athena-uwsgi;
    scgi_temp_path        /tmp/nginx-athena-scgi;

    access_log /dev/stdout;

    # --- HTTP (port 80) ---
    server {
        listen 80;
        server_name
            c.athena.local
            c1.athena.local
            ce.athena.local
            c4.athena.local
            c5.athena.local
            c6.athena.local
            osu.athena.local
            a.athena.local
            b.athena.local
            api.athena.local;

        location / {
            proxy_pass http://127.0.0.1:8000;

            # Preserve original Host header
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # WebSocket support (for future SignalR connections)
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }
    }

    # --- HTTPS (port 443) — uncomment after mkcert setup ---
    # server {
    #     listen 443 ssl;
    #     server_name
    #         c.athena.local
    #         c1.athena.local
