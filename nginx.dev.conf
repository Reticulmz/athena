    #         c5.athena.local
    #         c6.athena.local
    #         osu.athena.local
    #         a.athena.local
    #         b.athena.local
    #         api.athena.local;
    #
    #     ssl_certificate     /path/to/_wildcard.athena.local.pem;
    #     ssl_certificate_key /path/to/_wildcard.athena.local-key.pem;
    #
    #     location / {
    #         proxy_pass http://127.0.0.1:8000;
    #
