# athena development reverse proxy
# Usage: nginx -c /path/to/nginx.dev.conf -g 'daemon off;'

worker_processes 1;
pid .devenv/state/nginx/nginx.pid;
error_log .devenv/state/nginx/error.log;

events {
    worker_connections 64;
}

http {
    client_body_temp_path .devenv/state/nginx/client-body;
    proxy_temp_path       .devenv/state/nginx/proxy;
    fastcgi_temp_path     .devenv/state/nginx/fastcgi;
    uwsgi_temp_path       .devenv/state/nginx/uwsgi;
    scgi_temp_path        .devenv/state/nginx/scgi;

    access_log .devenv/state/nginx/access.log;
    error_log  .devenv/state/nginx/error.log;

    # --- HTTP (port 80) ---
    server {
        listen 80;
        server_name
            c.athena.localhost
            c1.athena.localhost
            ce.athena.localhost
            c4.athena.localhost
            c5.athena.localhost
            c6.athena.localhost
            osu.athena.localhost
            a.athena.localhost
            b.athena.localhost
            api.athena.localhost;

        location / {
            proxy_pass http://127.0.0.1:8000;

            # Preserve original Host header
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # WebSocket support (for future SignalR connections)
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }
    }

    # --- HTTPS (port 443) ---
    server {
        listen 443 ssl;
        server_name
            c.athena.localhost
            c1.athena.localhost
            ce.athena.localhost
            c4.athena.localhost
            c5.athena.localhost
            c6.athena.localhost
            osu.athena.localhost
            a.athena.localhost
            b.athena.localhost
            api.athena.localhost;

        ssl_certificate     certs/_wildcard.athena.localhost.pem;
        ssl_certificate_key certs/_wildcard.athena.localhost-key.pem;

        location / {
            proxy_pass http://127.0.0.1:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }
    }
}
